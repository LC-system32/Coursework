<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="bg" x1="3" y1="3" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="2" y="2" width="16" height="16" rx="7" fill="url(#bg)"/>

  <!-- back browser tab -->
  <g filter="url(#shadow)">
    <rect x="4.5" y="7" width="14.5" height="10.5" rx="2.5" fill="#ffffff" opacity="0.98"/>
    <path d="M4.5 9.5c0-1.375 1.125-2.5 2.5-2.5h5.5l2 2h2c1.375 0 2.5 1.125 2.5 2.5v1H4.5z" fill="#ffffff"/>
  </g>

  <!-- front browser tab -->
  <g filter="url(#shadow)">
    <rect x="13" y="14.5" width="14.5" height="10.5" rx="2.5" fill="#ffffff" opacity="0.98"/>
    <path d="M13 17c0-1.375 1.125-2.5 2.5-2.5h5.5l2 2h2c1.375 0 2.5 1.125 2.5 2.5v1H13z" fill="#ffffff"/>
  </g>

  <!-- top controls -->
  <g fill="#bfdbfe">
    <circle cx="7.25" cy="10.25" r="0.65"/>
    <circle cx="9" cy="10.25" r="0.65"/>
    <circle cx="10.75" cy="10.25" r="0.65"/>
    <rect x="12.5" y="9.7" width="4" height="1.1" rx="0.55"/>

    <circle cx="15.75" cy="17.75" r="0.65"/>
    <circle cx="17.5" cy="17.75" r="0.65"/>
    <circle cx="19.25" cy="17.75" r="0.65"/>
    <rect x="21" y="17.2" width="4" height="1.1" rx="0.55"/>
  </g>

  <!-- content lines -->
  <g fill="#93c5fd" opacity="0.9">
    <rect x="6.5" y="12.5" width="6.5" height="1.125" rx="0.5625"/>
    <rect x="6.5" y="14.5" width="4.75" height="1.125" rx="0.5625"/>

    <rect x="15" y="20" width="6.5" height="1.125" rx="0.5625"/>
    <rect x="15" y="22" width="4.75" height="1.125" rx="0.5625"/>
  </g>

  <!-- arrows -->
  <g stroke="#60a5fa" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- from lower tab -> up -> left -> to upper tab -->
    <path d="M25 13.875V9.5H20"/>
    <path d="M20.5 7.5l-2 2 2 2"/>

    <!-- from upper tab -> down -> right -> to lower tab -->
    <path d="M6.75 18.125V23H12.5"/>
    <path d="M11.25 21l2 2-2 2"/>
  </g>
</svg>
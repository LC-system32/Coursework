<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Import Bridge</title>
  <link rel="stylesheet" href="popup-common.css" />
  <link rel="stylesheet" href="popup-main.css" />
</head>
<body class="popup-body">
  <main class="popup-shell">
    <section class="panel">
      <header class="topbar">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true"></span>
          <div class="brand__copy">
            <p class="brand__eyebrow">Data transfer</p>
            <h1 class="brand__title">Імпорт даних</h1>
          </div>
        </div>

        <button class="icon-button" id="openSettingsBtn" type="button" aria-label="Відкрити налаштування">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.33 1.67h3.34l.38 2.47c.57.16 1.12.39 1.65.69l2.08-1.38 2.36 2.36-1.38 2.08c.3.53.53 1.08.69 1.65l2.47.38v3.34l-2.47.38c-.16.57-.39 1.12-.69 1.65l1.38 2.08-2.36 2.36-2.08-1.38c-.53.3-1.08.53-1.65.69l-.38 2.47h-3.34l-.38-2.47a7.77 7.77 0 0 1-1.65-.69l-2.08 1.38-2.36-2.36 1.38-2.08a7.77 7.77 0 0 1-.69-1.65l-2.47-.38V9.92l2.47-.38c.16-.57.39-1.12.69-1.65L3.86 5.81l2.36-2.36 2.08 1.38c.53-.3 1.08-.53 1.65-.69zm1.67 7.33a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" />
          </svg>
        </button>
      </header>

      <section class="main-screen">
        <section class="flow-card" aria-label="Напрямок імпорту">
          <div class="site-card">
            <span class="site-card__label">Звідки</span>
            <strong class="site-card__value" id="sourceSitePreview">strikeplagiarism.com</strong>
          </div>

          <div class="flow-card__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 12h12m-4-4 4 4-4 4" />
            </svg>
          </div>

          <div class="site-card site-card--target">
            <span class="site-card__label">Куди</span>
            <strong class="site-card__value" id="targetSitePreview">cabinet.vucdc.edu.ua</strong>
          </div>
        </section>

        <button class="primary-button" id="importBtn" type="button">Імпортувати дані</button>

        <p class="status-line" id="status" role="status" aria-live="polite">
          Схема переносу готова. Запустіть імпорт з активної вкладки.
        </p>

        <div class="bottom-row">
          <div class="hint-pill" aria-label="Гаряча клавіша">
            <span class="hint-pill__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="6" width="18" height="12" rx="3" ry="3"></rect>
                <path d="M7 10h1m2 0h1m2 0h4m-8 4h6" />
              </svg>
            </span>
            <span class="hint-pill__text">Швидкий запуск: Ctrl + Shift + F</span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="popup-common.js"></script>
  <script src="popup-main.js"></script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройки Data Import Bridge</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f7f7f9;
      color: #222;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .map-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .danger {
      background: #dc2626;
      color: #fff;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .status {
      margin-top: 16px;
      padding: 10px 12px;
      background: #eef2ff;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app" class="wrap">
    <div class="card">
      <h1>Настройки</h1>

      <div class="field">
        <label for="sourceSite">Сайт-источник</label>
        <input id="sourceSite" v-model="sourceSite" type="text" placeholder="https://source-site.com" />
      </div>

      <div class="field">
        <label for="targetSite">Сайт-приёмник</label>
        <input id="targetSite" v-model="targetSite" type="text" placeholder="https://target-site.com" />
      </div>

      <div class="field">
        <label>Сопоставление полей</label>

        <div
          class="map-row"
          v-for="(item, index) in fieldMappings"
          :key="index"
        >
          <input
            v-model="item.source"
            type="text"
            placeholder="Поле источника (id или name)"
          />

          <input
            v-model="item.target"
            type="text"
            placeholder="Поле приёмника (id или name)"
          />

          <button class="danger" @click="removeMapping(index)">Удалить</button>
        </div>

        <button class="secondary" @click="addMapping">Добавить пару</button>
      </div>

      <div class="actions">
        <button class="primary" @click="saveSettings">Сохранить</button>
        <button class="secondary" @click="resetSettings">Сбросить</button>
      </div>

      <div v-if="statusMessage" class="status">
        {{ statusMessage }}
      </div>
    </div>
  </div>

  <script src="../vendor/vue.global.prod.js"></script>
  <script src="settings.js"></script>
</body>
</html>
